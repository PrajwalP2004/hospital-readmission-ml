<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinical Decision Support Dashboard</title>
    <meta name="description"
        content="Clinical Decision Support Dashboard — Readmission risk scoring and care pathway intelligence for healthcare professionals." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --border: #e2e6ed;
            --border-focus: #4f6ef7;
            --text: #1a202c;
            --text-secondary: #5a6577;
            --text-muted: #8d95a3;
            --accent: #4f6ef7;
            --accent-bg: rgba(79, 110, 247, 0.08);
            --radius: 12px;
            --radius-sm: 8px;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.08);
            --transition: 0.2s ease;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── Header ──────────────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 60px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 34px;
            height: 34px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1rem;
        }

        .header-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        .header-subtitle {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-date {
            font-size: 0.78rem;
            color: var(--text-secondary);
        }

        .mock-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-bg);
            border: 1px solid rgba(79, 110, 247, 0.2);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .mock-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.35
            }
        }

        /* ─── Layout ──────────────────────────────────────────── */
        .dashboard {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            padding: 24px 32px;
            max-width: 1340px;
            margin: 0 auto;
        }

        @media(max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ─── Card ────────────────────────────────────────────── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow-sm);
        }

        .card-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ─── Search ──────────────────────────────────────────── */
        .search-wrapper {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 10px 12px 10px 38px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .search-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.12);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        /* Dropdown */
        .dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            max-height: 260px;
            overflow-y: auto;
            z-index: 200;
            box-shadow: var(--shadow-lg);
            animation: fadeDown 0.12s ease;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-3px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .dropdown-group {
            padding: 8px 12px 3px;
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
        }

        .dropdown-item {
            padding: 8px 12px;
            font-size: 0.84rem;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background var(--transition);
        }

        .dropdown-item:hover,
        .dropdown-item.selected {
            background: var(--accent-bg);
            color: var(--text);
        }

        .icd-code {
            font-size: 0.66rem;
            background: var(--bg);
            border-radius: 4px;
            padding: 1px 6px;
            font-family: 'SF Mono', Consolas, monospace;
            color: var(--text-muted);
        }

        .dropdown::-webkit-scrollbar {
            width: 4px;
        }

        .dropdown::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* ─── Patient Card ────────────────────────────────────── */
        .patient-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
        }

        .patient-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .patient-name {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .patient-age {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .patient-type-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.67rem;
            font-weight: 600;
            text-transform: capitalize;
            margin-top: 8px;
        }

        .patient-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }

        .meta-item {
            background: var(--surface);
            border-radius: 6px;
            padding: 8px 10px;
        }

        .meta-label {
            font-size: 0.62rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 2px;
        }

        .meta-value {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text);
        }

        /* ─── Charts Row ──────────────────────────────────────── */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media(max-width: 700px) {
            .charts-row {
                grid-template-columns: 1fr;
            }
        }

        /* ─── Gauge ───────────────────────────────────────────── */
        .gauge-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
        }

        .gauge-score {
            font-size: 2.4rem;
            font-weight: 700;
            line-height: 1;
        }

        .gauge-label {
            font-size: 0.72rem;
            color: var(--text-secondary);
        }

        .risk-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-top: 2px;
        }

        .risk-high {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.25);
            color: #dc3545;
        }

        .risk-medium {
            background: rgba(236, 165, 43, 0.1);
            border: 1px solid rgba(236, 165, 43, 0.25);
            color: #d4920a;
        }

        .risk-low {
            background: rgba(25, 135, 84, 0.1);
            border: 1px solid rgba(25, 135, 84, 0.25);
            color: #198754;
        }

        /* ─── Risk Factors ────────────────────────────────────── */
        .factors-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .factor-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .factor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .factor-name {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .factor-value {
            font-size: 0.8rem;
            font-weight: 600;
        }

        .factor-track {
            height: 6px;
            background: var(--bg);
            border-radius: 3px;
            overflow: hidden;
        }

        .factor-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ─── Suggestions ─────────────────────────────────────── */
        .suggestions-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .suggestions-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            flex-shrink: 0;
        }

        .suggestions-title {
            font-size: 0.9rem;
            font-weight: 700;
        }

        .suggestions-subtitle {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .suggestion-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            transition: transform var(--transition);
            animation: slideIn 0.25s ease both;
        }

        .suggestion-item:hover {
            transform: translateX(3px);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-6px)
            }

            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        .suggestion-icon-box {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.9rem;
            margin-top: 1px;
        }

        .suggestion-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.5;
            padding-top: 4px;
        }

        /* ─── Empty / Loading ─────────────────────────────────── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 32px 16px;
            color: var(--text-muted);
            text-align: center;
            font-size: 0.82rem;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2.5px solid rgba(79, 110, 247, 0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

            cardiac: { name: "Margaret T.", age: 73, ward: "Cardiac ICU", mrn: "MRN-004821", admitted: "Feb 24, 2026", initials: "MT" },
            orthopedic: { name: "Robert H.", age: 67, ward: "Orthopedic Wing B", mrn: "MRN-007134", admitted: "Feb 25, 2026", initials: "RH" },
            renal: { name: "Sandra K.", age: 66, ward: "Nephrology Unit", mrn: "MRN-002975", admitted: "Feb 23, 2026", initials: "SK" },
            respiratory: { name: "James O.", age: 61, ward: "Respiratory Unit", mrn: "MRN-009341", admitted: "Feb 26, 2026", initials: "JO" },
        };

        const mockApi = {
            getDx: async () => { await _delay(350); return DIAGNOSES; },
            getRisk: async (id) => { await _delay(400); return RISK_DB[id] || null; },
            getSugg: async (t) => { await _delay(380); return SUGG_DB[t] || null; },
            getPat: async (t) => { await _delay(340); return PAT_DB[t] || PAT_DB.cardiac; },
        };

        // ── HELPERS ────────────────────────────────────────────────────────────
        const barColor = v => v >= 70 ? '#dc3545' : v >= 45 ? '#d4920a' : '#198754';
        const riskClass = l => l === 'High' ? 'risk-high' : l === 'Medium' ? 'risk-medium' : 'risk-low';
        const typeColor = { cardiac: '#dc3545', orthopedic: '#0d7fd4', renal: '#7c3aed', respiratory: '#198754' };
        const typeIcon = { cardiac: '❤️', orthopedic: '🦴', renal: '💧', respiratory: '🫁' };

        // ── GAUGE ──────────────────────────────────────────────────────────────
        function Gauge({ score, level }) {
            const R = 85, cx = 120, cy = 108;
            const toRad = a => (a - 90) * Math.PI / 180;
            const arcXY = a => ({ x: cx + R * Math.cos(toRad(a)), y: cy + R * Math.sin(toRad(a)) });
            function arc(a1, a2, r) {
                const s = arcXY(a1), e = arcXY(a2), lg = Math.abs(a2 - a1) > 180 ? 1 : 0;
                return `M${s.x} ${s.y} A${r} ${r} 0 ${lg} 1 ${e.x} ${e.y}`;
            }
            const col = score >= 71 ? '#dc3545' : score >= 41 ? '#d4920a' : '#198754';
            const scoreAngle = -180 + score * 1.8;
            const tip = arcXY(scoreAngle), bl = arcXY(scoreAngle + 10), br = arcXY(scoreAngle - 10);
            const tip2 = { x: cx + (R - 28) * Math.cos(toRad(scoreAngle)), y: cy + (R - 28) * Math.sin(toRad(scoreAngle)) };
            return React.createElement('div', { className: 'gauge-container' },
                React.createElement('svg', { viewBox: '0 0 240 120', style: { width: '100%', maxWidth: 230 } },
                    React.createElement('path', { d: arc(-180, -108, R), fill: 'none', stroke: 'rgba(25,135,84,0.15)', strokeWidth: 12, strokeLinecap: 'round' }),
                    React.createElement('path', { d: arc(-108, -54, R), fill: 'none', stroke: 'rgba(212,146,10,0.15)', strokeWidth: 12, strokeLinecap: 'round' }),
                    React.createElement('path', { d: arc(-54, 0, R), fill: 'none', stroke: 'rgba(220,53,69,0.15)', strokeWidth: 12, strokeLinecap: 'round' }),
                    React.createElement('path', { d: arc(-180, scoreAngle, R), fill: 'none', stroke: col, strokeWidth: 12, strokeLinecap: 'round' }),
                    ...[0, 25, 50, 75, 100].map(v => {
                        const a = -180 + v * 1.8;
                        const outer = arcXY(a), inner = { x: cx + (R - 12) * Math.cos(toRad(a)), y: cy + (R - 12) * Math.sin(toRad(a)) };
                        const lbl = { x: cx + (R + 16) * Math.cos(toRad(a)), y: cy + (R + 16) * Math.sin(toRad(a)) };
                        return React.createElement('g', { key: v },
                            React.createElement('line', { x1: inner.x, y1: inner.y, x2: outer.x, y2: outer.y, stroke: '#c8cdd5', strokeWidth: 1.2 }),
                            React.createElement('text', { x: lbl.x, y: lbl.y + 3, textAnchor: 'middle', fill: '#8d95a3', fontSize: 8 }, v)
                        );
                    }),
                    React.createElement('polygon', { points: `${tip2.x},${tip2.y} ${bl.x},${bl.y} ${br.x},${br.y}`, fill: col }),
                    React.createElement('circle', { cx, cy, r: 6, fill: '#fff', stroke: col, strokeWidth: 1.5 }),
                ),
                React.createElement('div', { className: 'gauge-score', style: { color: col } }, score),
                React.createElement('div', { className: 'gauge-label' }, 'Readmission Risk Score'),
                React.createElement('div', { className: `risk-badge ${riskClass(level)}` }, `${level} Risk`)
            );
        }

        // ── RISK BREAKDOWN ─────────────────────────────────────────────────────
        function RiskBreakdown({ factors }) {
            return React.createElement('div', { className: 'factors-list' },
                factors.map((f, i) => React.createElement('div', { key: i, className: 'factor-row' },
                    React.createElement('div', { className: 'factor-header' },
                        React.createElement('span', { className: 'factor-name' }, f.name),
                        React.createElement('span', { className: 'factor-value', style: { color: barColor(f.v) } }, f.v)
                    ),
                    React.createElement('div', { className: 'factor-track' },
                        React.createElement('div', {
                            className: 'factor-bar', style: {
                                width: `${f.v}%`,
                                background: barColor(f.v),
                                transitionDelay: `${i * 50}ms`
                            }
                        })
                    )
                ))
            );
        }

        // ── SUGGESTIONS ────────────────────────────────────────────────────────
        function Suggestions({ data }) {
            if (!data) return null;
            return React.createElement('div', null,
                React.createElement('div', { className: 'suggestions-header' },
                    React.createElement('div', { className: 'suggestions-icon', style: { background: data.bg, border: `1px solid ${data.border}` } }, data.icon),
                    React.createElement('div', null,
                        React.createElement('div', { className: 'suggestions-title', style: { color: data.color } }, data.title),
                        React.createElement('div', { className: 'suggestions-subtitle' }, `Specialty: ${data.badge}`)
                    )
                ),
                data.suggestions.map((s, i) => React.createElement('div', {
                    key: `${data.badge}-${i}`,
                    className: 'suggestion-item',
                    style: { background: data.bg, border: `1px solid ${data.border}`, animationDelay: `${i * 50}ms` }
                },
                    React.createElement('div', { className: 'suggestion-icon-box', style: { background: `${data.color}0d`, border: `1px solid ${data.border}` } }, s.i),
                    React.createElement('div', { className: 'suggestion-text' }, s.t)
                ))
            );
        }

        // ── SEARCH ─────────────────────────────────────────────────────────────
        function Search({ diagnoses, onSelect, selId }) {
            const [q, setQ] = useState('');
            const [open, setOpen] = useState(false);
            const ref = useRef();
            useEffect(() => {
                const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
                document.addEventListener('mousedown', h);
                return () => document.removeEventListener('mousedown', h);
            }, []);
            const filtered = diagnoses.filter(d => d.label.toLowerCase().includes(q.toLowerCase()) || d.code.toLowerCase().includes(q.toLowerCase()));
            const groups = [...new Set(filtered.map(d => d.group))];
            return React.createElement('div', { className: 'search-wrapper', ref },
                React.createElement('span', { className: 'search-icon' }, '🔍'),
                React.createElement('input', {
                    id: 'diagnosis-search',
                    className: 'search-input', type: 'text',
                    placeholder: 'Search ICD-10 (e.g. Heart Failure, I50)...',
                    value: q,
                    onChange: e => { setQ(e.target.value); setOpen(true); },
                    onFocus: () => setOpen(true),
                }),
                open && filtered.length > 0 && React.createElement('div', { className: 'dropdown' },
                    groups.map(g => React.createElement('div', { key: g },
                        React.createElement('div', { className: 'dropdown-group' }, g),
                        filtered.filter(d => d.group === g).map(d => React.createElement('div', {
                            key: d.id,
                            className: `dropdown-item${d.id === selId ? ' selected' : ''}`,
                            onMouseDown: () => { setQ(d.label); setOpen(false); onSelect(d); }
                        }, d.label, React.createElement('span', { className: 'icd-code' }, d.code)))
                    ))
                )
            );
        }

        // ── PATIENT CARD ───────────────────────────────────────────────────────
        function PatientCard({ pat, type }) {
            if (!pat) return React.createElement('div', { className: 'patient-card' },
                React.createElement('div', { className: 'empty-state' }, '🔍', 'Select a diagnosis to load patient')
            );
            const c = typeColor[type] || '#4f6ef7';
            return React.createElement('div', { className: 'patient-card' },
                React.createElement('div', { className: 'patient-avatar', style: { background: `${c}14`, border: `1.5px solid ${c}33`, color: c } }, pat.initials),
                React.createElement('div', { className: 'patient-name' }, pat.name),
                React.createElement('div', { className: 'patient-age' }, `Age ${pat.age}`),
                React.createElement('div', { className: 'patient-type-chip', style: { background: `${c}14`, border: `1px solid ${c}28`, color: c } },
                    typeIcon[type], ' ', type
                ),
                React.createElement('div', { className: 'patient-meta' },
                    React.createElement('div', { className: 'meta-item' }, React.createElement('div', { className: 'meta-label' }, 'Ward'), React.createElement('div', { className: 'meta-value' }, pat.ward)),
                    React.createElement('div', { className: 'meta-item' }, React.createElement('div', { className: 'meta-label' }, 'MRN'), React.createElement('div', { className: 'meta-value' }, pat.mrn)),
                    React.createElement('div', { className: 'meta-item' }, React.createElement('div', { className: 'meta-label' }, 'Admitted'), React.createElement('div', { className: 'meta-value' }, pat.admitted)),
                    React.createElement('div', { className: 'meta-item' }, React.createElement('div', { className: 'meta-label' }, 'Status'), React.createElement('div', { className: 'meta-value', style: { color: '#198754' } }, '● Inpatient'))
                )
            );
        }

        // ── APP ────────────────────────────────────────────────────────────────
        function App() {
            const [diagnoses, setDiagnoses] = useState([]);
            const [selDx, setSelDx] = useState(null);
            const [risk, setRisk] = useState(null);
            const [sugg, setSugg] = useState(null);
            const [pat, setPat] = useState(null);
            const [loading, setLoading] = useState(false);
            const [ready, setReady] = useState(false);

            useEffect(() => {
                mockApi.getDx().then(d => { setDiagnoses(d); setReady(true); });
            }, []);

            const onSelect = useCallback(async dx => {
                setSelDx(dx.id); setLoading(true);
                setRisk(null); setSugg(null); setPat(null);
                const [r, s, p] = await Promise.all([mockApi.getRisk(dx.id), mockApi.getSugg(dx.type), mockApi.getPat(dx.type)]);
                setRisk(r); setSugg(s); setPat(p); setLoading(false);
            }, []);

            const Empty = ({ icon, text }) => React.createElement('div', { className: 'empty-state' },
                React.createElement('span', { style: { fontSize: '1.8rem' } }, icon),
                React.createElement('p', null, text)
            );

            const Load = () => React.createElement('div', { className: 'empty-state' },
                React.createElement('div', { className: 'spinner' }),
                React.createElement('p', { style: { color: 'var(--accent)' } }, 'Loading...')
            );

            return React.createElement('div', null,
                // HEADER
                React.createElement('header', { className: 'header' },
                    React.createElement('div', { className: 'header-brand' },
                        React.createElement('div', { className: 'header-logo' }, '📊'),
                        React.createElement('div', null,
                            React.createElement('div', { className: 'header-title' }, 'Clinical Decision Support'),
                            React.createElement('div', { className: 'header-subtitle' }, 'Readmission Risk & Care Pathway Intelligence')
                        )
                    ),
                    React.createElement('div', { className: 'header-right' },
                        React.createElement('span', { className: 'header-date' }, 'Feb 27, 2026'),
                        React.createElement('div', { className: 'mock-badge' }, React.createElement('span', { className: 'mock-dot' }), React.createElement('span', null, 'MOCK MODE'))
                    )
                ),

                // DASHBOARD
                React.createElement('div', { className: 'dashboard' },
                    // SIDEBAR
                    React.createElement('div', { className: 'sidebar' },
                        React.createElement('div', { className: 'card' },
                            React.createElement('div', { className: 'card-title' }, '🔬 Diagnosis Search'),
                            !ready
                                ? React.createElement(Load)
                                : React.createElement(Search, { diagnoses, onSelect, selId: selDx })
                        ),
                        React.createElement('div', { className: 'card' },
                            React.createElement('div', { className: 'card-title' }, '👤 Patient Summary'),
                            loading ? React.createElement(Load) : React.createElement(PatientCard, { pat, type: risk?.patientType })
                        )
                    ),

                    // MAIN
                    React.createElement('div', { className: 'main-content' },
                        React.createElement('div', { className: 'charts-row' },
                            React.createElement('div', { className: 'card' },
                                React.createElement('div', { className: 'card-title' }, '📊 Risk Score Gauge'),
                                loading ? React.createElement(Load)
                                    : risk ? React.createElement(Gauge, { score: risk.score, level: risk.level })
                                        : React.createElement(Empty, { icon: '📊', text: 'Select a diagnosis' })
                            ),
                            React.createElement('div', { className: 'card' },
                                React.createElement('div', { className: 'card-title' }, '📉 Risk Factor Breakdown'),
                                loading ? React.createElement(Load)
                                    : risk ? React.createElement(RiskBreakdown, { factors: risk.factors })
                                        : React.createElement(Empty, { icon: '📉', text: 'Select a diagnosis' })
                            )
                        ),
                        React.createElement('div', { className: 'card' },
                            React.createElement('div', { className: 'card-title' }, '💡 Adaptive Care Suggestions'),
                            loading
                                ? React.createElement('div', { className: 'empty-state' }, React.createElement('div', { className: 'spinner' }), React.createElement('p', { style: { color: 'var(--accent)' } }, 'Generating care pathway...'))
                                : sugg
                                    ? React.createElement(Suggestions, { data: sugg })
                                    : React.createElement(Empty, { icon: '💡', text: 'Select a diagnosis to see specialty-specific care suggestions' })
                        )
                    )
                )
            );
        }

        // ── MOUNT ──────────────────────────────────────────────────────────────
        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(App));
        } catch (e) {
            document.getElementById('root').innerHTML = '<div style="color:#dc3545;padding:40px;font-family:monospace">Error: ' + e.message + '</div>';
            console.error('Mount error:', e);
        }
    </script>
</body>

</html>
